experiment:
  name: "baseline_model_v1"
  seed: 42
  track_metrics: true
hardware:
  device: "cuda"
  mixed_precision: true
  num_workers: 4
training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  optimizer: "AdamW"
  early_stopping_patience: 10
model:
  architecture: "yolov8"
  pretrained: true
  export_format: "onnx"
